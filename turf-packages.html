<!DOCTYPE html><html lang="en"><head><title>Turf Package Management</title></head><body>
<h1>Manage Pricing Packages</h1><form action="/save-package" method="post">
<label>Package Name: <input type="text" name="pkg_name" required></label><br>
<label>Duration (mins): <input type="number" name="duration" min="1" required></label> <label>Price (BDT): <input type="number" step="0.01" min="0" required></label><br>
<label>Is Available: <input type="checkbox" name="is_available" checked></label><br>
<button type="submit">Add Package</button> <button type="button">Edit</button> <button type="button">Delete</button>
<h2>Package List</h2><table border="1"><tr><th>ID</th><th>Name</th><th>Duration</th><th>Price</th><th>Available</th></tr><tr><td>1</td><td>Standard</td><td>60</td><td>500.00</td><td>Yes</td></tr></table>
</body></html>
