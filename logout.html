<!DOCTYPE html><html lang="en"><head><title>Logout Confirmation</title></head><body>
<h1>End Session</h1><form action="/logout" method="post">
<p>Are you sure you want to logout? This will terminate your session.</p>
<label>Confirm Action: <input type="checkbox" name="confirm_logout" required></label><br>
<button type="submit">Confirm Logout</button> <a href="/dashboard">Cancel</a>
<p><small>Cached data will be cleared; back navigation disabled.</small></p>
</form></body></html>
