<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe: Change Password</title>
<style>
    body { font-family: sans-serif; padding: 20px; }
    .window { border: 2px solid black; width: 400px; padding: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
    .form-group input { border: 1px solid black; width: 90%; padding: 8px; box-sizing: border-box; }
    .btn { border: 1px solid black; background: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 90%; }
    .msg-area { margin-top: 15px; min-height: 20px; font-style: italic; color: #555; border: 1px dotted black; padding: 5px; width: 90%; box-sizing: border-box;}
</style>
</head>
<body>

<div class="window">
    <h2>Change Password</h2>
    
    <div class="form-group">
        <label>Current Password</label>
        <input type="password" placeholder="*** [Masked Input]">
    </div>

    <div class="form-group">
        <label>New Password</label>
        <input type="password" placeholder="*** [Masked Input]">
    </div>

    <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" placeholder="*** [Masked Input]">
    </div>

    <div>
        <button class="btn">Change Password</button>
    </div>

    <!-- Messages -->
    <div class="msg-area">
        [ Validation Errors (e.g. "Passwords do not match") / Success Messages ]
    </div>
</div>

</body>
</html>
