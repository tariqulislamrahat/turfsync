<!DOCTYPE html><html lang="en"><head><title>Player Login</title></head><body>
<h1>Player Login</h1><form action="/player-login" method="post">
<label>Username: <input type="text" name="username" required></label><br>
<label>Password: <input type="password" name="password" required></label><br>
<label>Show Password: <input type="checkbox" name="show_pass"></label><br>
<button type="submit">Login</button> <a href="/signup">New user? Sign Up</a>
<p><small>Role validated server-side; inactive accounts denied access.</small></p>
</form></body></html>
